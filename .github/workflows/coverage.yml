name: Test Coverage

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java 25
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '25'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run tests with coverage
      run: ./gradlew test jacocoTestReport --no-daemon --stacktrace

    - name: Generate coverage summary
      run: |
        echo "# Test Coverage Report" > coverage-summary.md
        echo "" >> coverage-summary.md
        find . -name "index.html" -path "*/jacocoHtml/*" | while read file; do
          module=$(echo $file | sed 's|./||' | cut -d'/' -f1)
          echo "## $module" >> coverage-summary.md
          echo "Coverage report available in artifacts" >> coverage-summary.md
          echo "" >> coverage-summary.md
        done

    - name: Upload coverage reports
      uses: actions/upload-artifact@v4
      with:
        name: coverage-reports
        path: |
          **/build/reports/jacoco/test/html/
          **/build/reports/jacoco/test/jacocoTestReport.xml

    - name: Upload coverage summary
      uses: actions/upload-artifact@v4
      with:
        name: coverage-summary
        path: coverage-summary.md

    - name: Comment coverage summary
      uses: actions/github-script@v7
      if: github.event_name == 'pull_request'
      with:
        script: |
          const fs = require('fs');
          const summary = fs.readFileSync('coverage-summary.md', 'utf8');
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: summary
          });
